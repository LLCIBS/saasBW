# Универсальные промпты для анализа звонков (любая отрасль)
# Настройте под свою компанию в веб-интерфейсе
bez_perevoda: |
  ЗАДАЧА:
  Определи тип звонка, класс и результат по диалогу клиента и сотрудника.

  ФОРМАТ ОТВЕТА:
  Первые три строки всегда должны быть тегами:
  [ТИПЗВОНКА:ЦЕЛЕВОЙ] или [ТИПЗВОНКА:НЕЦЕЛЕВОЙ]
  [КЛАСС:А] или [КЛАСС:Б] или [КЛАСС:НЕТ]
  [РЕЗУЛЬТАТ:ЗАПИСЬ] или [РЕЗУЛЬТАТ:НЕТ] или [РЕЗУЛЬТАТ:ПЕРЕЗВОНИТЬ] или [РЕЗУЛЬТАТ:ПЕРЕВОД] или [РЕЗУЛЬТАТ:МЕССЕНДЖЕР] или [РЕЗУЛЬТАТ:ОТКАЗ]
  После тегов добавь строку "Объяснение:" и 2-3 коротких предложения.

  ЦЕЛЕВОЙ ЕСЛИ:
  клиент впервые обращается с запросом по услуге/товару, хочет записаться, заказать, уточнить цену, наличие, сроки, время работы или возможность решения.

  НЕЦЕЛЕВОЙ ЕСЛИ:
  клиент продолжает ранее начатый вопрос, спрашивает статус текущих работ/заказа, переносит существующую запись или сообщает, что уже приехал/подошёл.

  КЛАСС:
  [КЛАСС:А] — клиент явно хочет записаться, заказать или оформить услугу.
  [КЛАСС:Б] — клиент только уточняет информацию без явного оформления.
  [КЛАСС:НЕТ] — только для нецелевых звонков.

  РЕЗУЛЬТАТ:
  [РЕЗУЛЬТАТ:ЗАПИСЬ] — клиент записан или договорились о визите/заказе.
  [РЕЗУЛЬТАТ:ПЕРЕЗВОНИТЬ] — сотрудник обещал сам перезвонить.
  [РЕЗУЛЬТАТ:ПЕРЕВОД] — сотрудник оформил передачу/заявку на другую станцию или отдел.
  [РЕЗУЛЬТАТ:МЕССЕНДЖЕР] — договорились продолжить в мессенджере или по личному номеру.
  [РЕЗУЛЬТАТ:ОТКАЗ] — клиент отказался от предложенного варианта.
  [РЕЗУЛЬТАТ:НЕТ] — нет записи, отказа, перевода, мессенджера или обещанного перезвона.

  Если звонок нецелевой, всегда верни:
  [ТИПЗВОНКА:НЕЦЕЛЕВОЙ]
  [КЛАСС:НЕТ]
  [РЕЗУЛЬТАТ:НЕТ]

  Не используй markdown, таблицы и лишний текст до тегов.
nizhniy: |
  То же, что bez_perevoda. Настройте промпты под свою отрасль в веб-интерфейсе.
s_perevodom: |
  То же, что bez_perevoda. Для звонков с переводом на другой филиал.
default: Универсальный промпт. Настройте в разделе «Промпты».
