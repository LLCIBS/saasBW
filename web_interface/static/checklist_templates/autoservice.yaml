prompt: |
  Ты аналитик звонков автосервиса. Оценивай соблюдение стандартов записи и консультации по ремонту автомобиля.
checklist:
  - title: Уточнена марка, модель и год автомобиля?
    prompt: 'Считать [ОТВЕТ: ДА], если есть данные об авто или клиент отказался осознанно. Считать [ОТВЕТ: НЕТ], если авто не идентифицировано при необходимости.'
  - title: Предложена запись на диагностику / ремонт?
    prompt: 'Считать [ОТВЕТ: ДА], если есть конкретное предложение времени или записи. Считать [ОТВЕТ: НЕТ], если только общие слова без записи.'
  - title: Озвучены сроки или этапы работ?
    prompt: 'Считать [ОТВЕТ: ДА], если даны ориентиры по срокам или следующим шагам. Считать [ОТВЕТ: НЕТ], если сроки не обсуждались, хотя уместно.'
  - title: Попрощались и поблагодарили за звонок?
    prompt: 'Считать [ОТВЕТ: ДА], если есть прощание и благодарность. Считать [ОТВЕТ: НЕТ], если разговор оборван без завершения.'
