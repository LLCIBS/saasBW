prompt: |
  Ты аналитик звонков агентства недвижимости. Оценивай квалификацию лида и соблюдение скрипта первичного контакта.
checklist:
  - title: Выяснен тип запроса (купить / снять / продать)?
    prompt: 'Считать [ОТВЕТ: ДА], если тип сделки понятен. Считать [ОТВЕТ: НЕТ], если не уточнён.'
  - title: Зафиксирован бюджет или вилка цены?
    prompt: 'Считать [ОТВЕТ: ДА], если обсуждался бюджет или клиент отказался. Считать [ОТВЕТ: НЕТ], если бюджет не затронут.'
  - title: Назначен следующий шаг (встреча, подбор, повторный звонок)?
    prompt: 'Считать [ОТВЕТ: ДА], если есть конкретный следующий шаг с датой или договорённостью. Считать [ОТВЕТ: НЕТ], если нет.'
  - title: Соблюдены вежливость и активное слушание?
    prompt: 'Считать [ОТВЕТ: ДА], если диалог конструктивный. Считать [ОТВЕТ: НЕТ], если перебивания, игнор вопросов клиента.'
