prompt: |
  Ты аналитик записей встреч и совещаний. Выдели факты, решения и ответственных по пунктам ниже.
checklist:
  - title: Зафиксирована цель встречи?
    prompt: 'Считать [ОТВЕТ: ДА], если из разговора понятна повестка или цель. Считать [ОТВЕТ: НЕТ], если нет.'
  - title: Перечислены принятые решения?
    prompt: 'Считать [ОТВЕТ: ДА], если есть хотя бы одно явное решение. Считать [ОТВЕТ: НЕТ], если решений не сформулировано.'
  - title: Указаны ответственные и сроки по задачам?
    prompt: 'Считать [ОТВЕТ: ДА], если звучат исполнители или дедлайны. Считать [ОТВЕТ: НЕТ], если задачи без ответственных/сроков.'
  - title: Назначен следующий синк или проверка?
    prompt: 'Считать [ОТВЕТ: ДА], если есть следующая встреча или контрольная точка. Считать [ОТВЕТ: НЕТ], если нет.'
