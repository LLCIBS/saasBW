prompt: |
  Ты аналитик звонков в медицинскую организацию. Оценивай этику общения и корректность направления пациента.
checklist:
  - title: Уточнена цель обращения (запись, справка, консультация)?
    prompt: 'Считать [ОТВЕТ: ДА], если цель ясна. Считать [ОТВЕТ: НЕТ], если нет.'
  - title: Предложены доступные варианты записи (врач, время)?
    prompt: 'Считать [ОТВЕТ: ДА], если есть варианты или объяснена очередь. Считать [ОТВЕТ: НЕТ], если запись не проработана.'
  - title: Соблюден конфиденциальный и уважительный тон?
    prompt: 'Считать [ОТВЕТ: ДА], если тон профессиональный. Считать [ОТВЕТ: НЕТ], если тонивность или давление.'
  - title: В конце озвучены дата, время и адрес (если применимо)?
    prompt: 'Считать [ОТВЕТ: ДА], если при записи подтверждены детали визита. Считать [ОТВЕТ: НЕТ], если запись без уточнения деталей.'
